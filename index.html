<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chant des Oiseaux</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Cinzel+Decorative:wght@400&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#03050e; font-family:'Cormorant Garamond',serif; overflow:hidden; height:100dvh; width:100vw; }
  canvas { position:fixed; inset:0; width:100%; height:100%; }

  #hud { position:fixed; top:18px; right:18px; text-align:right; pointer-events:none; z-index:20; }
  #hud-freq { font-size:22px; font-weight:300; color:rgba(255,255,255,0.75); letter-spacing:0.05em; }
  #hud-note { font-size:13px; letter-spacing:0.3em; color:rgba(244,196,48,0.65); margin-top:3px; }
  #hud-vol  { margin-top:7px; width:76px; height:2px; background:rgba(255,255,255,0.07); border-radius:2px; margin-left:auto; overflow:hidden; }
  #hud-vol-fill { height:100%; background:linear-gradient(90deg,#4ecdc4,#f4c430); width:0%; border-radius:2px; transition:width 0.04s linear; }

  #ui {
    position:fixed; bottom:0; left:0; right:0;
    padding:14px 14px 28px;
    background:linear-gradient(transparent, rgba(0,0,0,0.85) 40%);
    display:flex; flex-direction:column; align-items:center; gap:10px;
    z-index:20; pointer-events:none;
  }
  #title { font-family:'Cinzel Decorative',serif; font-size:clamp(11px,3vw,15px); letter-spacing:0.38em; color:rgba(244,196,48,0.82); text-shadow:0 0 22px rgba(244,196,48,0.28); }
  #controls { display:flex; gap:10px; pointer-events:all; flex-wrap:wrap; justify-content:center; }
  .btn {
    font-family:'Cormorant Garamond',serif; font-size:12px; letter-spacing:0.22em; text-transform:uppercase;
    background:rgba(0,0,0,0.5); border:1px solid rgba(244,196,48,0.38); color:rgba(244,196,48,0.88);
    padding:10px 24px; cursor:pointer; transition:all 0.22s; -webkit-tap-highlight-color:transparent; border-radius:1px;
  }
  .btn:hover,.btn:active { background:rgba(244,196,48,0.13); border-color:rgba(244,196,48,0.85); }
  .btn.lit { background:rgba(244,196,48,0.15); border-color:#f4c430; box-shadow:0 0 18px rgba(244,196,48,0.22); }
  .btn.red { border-color:rgba(255,100,50,0.4); color:rgba(255,130,70,0.88); }
  .btn.red:hover,.btn.red:active { background:rgba(255,100,50,0.1); border-color:rgba(255,100,50,0.85); }

  #style-row { display:flex; gap:12px; align-items:center; pointer-events:all; flex-wrap:wrap; justify-content:center; }
  .slbl { font-size:9px; letter-spacing:0.28em; color:rgba(255,255,255,0.22); text-transform:uppercase; }
  .sdot {
    font-family:'Cormorant Garamond',serif; font-size:10px; letter-spacing:0.18em; text-transform:uppercase;
    color:rgba(244,196,48,0.32); border:none; background:none;
    border-bottom:1px solid transparent; padding-bottom:1px;
    cursor:pointer; transition:all 0.2s; -webkit-tap-highlight-color:transparent;
  }
  .sdot.on { color:rgba(244,196,48,0.92); border-color:rgba(244,196,48,0.6); }
  #status { font-style:italic; font-size:11px; letter-spacing:0.16em; color:rgba(168,237,234,0.5); min-height:16px; text-align:center; max-width:360px; padding:0 12px; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div id="hud-freq">— Hz</div>
  <div id="hud-note">—</div>
  <div id="hud-vol"><div id="hud-vol-fill"></div></div>
</div>

<div id="ui">
  <div id="title">Chant des Oiseaux</div>
  <div id="controls">
    <button class="btn" id="btnListen">Écouter</button>
    <button class="btn red" id="btnClear">Effacer</button>
    <button class="btn" id="btnSave">Capturer</button>
  </div>
  <div id="style-row">
    <span class="slbl">Style</span>
    <button class="sdot on" data-s="0">Spectrographe</button>
    <button class="sdot"    data-s="1">Plumes</button>
    <button class="sdot"    data-s="2">Eclosion</button>
    <button class="sdot"    data-s="3">Vague</button>
  </div>
  <div id="status">Appuyer sur Ecouter puis autoriser le micro</div>
</div>

<script>
var canvas = document.getElementById('c');
var ctx    = canvas.getContext('2d');

// Variables spectrographe declarees en premier
var specAngle = 0;
var specR     = 0;
var specPts   = [];

function resetSpec() {
  specAngle = 0;
  specR     = 0;
  specPts   = [];
}

function maxR() {
  return Math.min(canvas.width, canvas.height) * 0.44;
}

function paintBg() {
  var g = ctx.createLinearGradient(0, 0, 0, canvas.height);
  g.addColorStop(0,   '#03050e');
  g.addColorStop(0.6, '#070c1a');
  g.addColorStop(1,   '#0a1020');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  paintBg();
  resetSpec();
}
resize();
window.addEventListener('resize', resize);

// Audio
var audioCtx, analyser, micSrc, freqData, timeData, bufLen;
var listening = false;
var raf, drawStyle = 0, lastMark = 0;
var bloomA = 0, waveT = 0;

// UI
var btnListen  = document.getElementById('btnListen');
var btnClear   = document.getElementById('btnClear');
var btnSave    = document.getElementById('btnSave');
var statusEl   = document.getElementById('status');
var hudFreq    = document.getElementById('hud-freq');
var hudNote    = document.getElementById('hud-note');
var hudVolFill = document.getElementById('hud-vol-fill');

// Couleurs
function freqToHue(freq) {
  var lo = Math.log2(80), hi = Math.log2(16000);
  var t  = Math.max(0, Math.min(1, (Math.log2(Math.max(freq, 80)) - lo) / (hi - lo)));
  return t * 300;
}
function frgba(freq, a) {
  if (a === undefined) a = 1;
  return 'hsla(' + freqToHue(freq).toFixed(1) + ',88%,62%,' + a + ')';
}

var NOTES = ['Do','Do#','Re','Re#','Mi','Fa','Fa#','Sol','Sol#','La','La#','Si'];
function freqToNote(freq) {
  if (!freq || freq <= 0) return '-';
  var n = Math.round(12 * Math.log2(freq / 440)) + 69;
  return NOTES[((n % 12) + 12) % 12] + (Math.floor(n / 12) - 1);
}

// Analyse audio
function dominantFreq() {
  analyser.getByteFrequencyData(freqData);
  var minBin = Math.ceil(80 / (audioCtx.sampleRate / analyser.fftSize));
  var peak = 0, idx = minBin;
  for (var i = minBin; i < bufLen; i++) {
    if (freqData[i] > peak) { peak = freqData[i]; idx = i; }
  }
  var p = freqData[Math.max(0, idx - 1)];
  var n = freqData[Math.min(bufLen - 1, idx + 1)];
  var d = p - 2 * peak + n;
  var ref = (d !== 0) ? idx - 0.5 * (n - p) / d : idx;
  return { freq: ref * (audioCtx.sampleRate / analyser.fftSize), volume: peak / 255 };
}

function getRms() {
  analyser.getByteTimeDomainData(timeData);
  var s = 0;
  for (var i = 0; i < bufLen; i++) {
    var v = (timeData[i] - 128) / 128;
    s += v * v;
  }
  return Math.sqrt(s / bufLen);
}

// Spectrographe radial
function drawSpectrograph(freq, vol, rmsVal) {
  var cx = canvas.width  * 0.5;
  var cy = canvas.height * 0.5;

  var lo = Math.log2(80), hi = Math.log2(16000);
  var t  = Math.max(0, Math.min(1, (Math.log2(Math.max(freq, 80)) - lo) / (hi - lo)));
  var rotSpeed = 0.008 + t * 0.044;

  if (rmsVal > 0.005 && freq > 80) {
    specR += vol * 4.5;
    if (specR > maxR()) specR = 2;
  } else {
    specR *= 0.97;
  }

  specAngle += rotSpeed;

  var x = cx + Math.cos(specAngle) * specR;
  var y = cy + Math.sin(specAngle) * specR;

  if (specPts.length > 0 && rmsVal > 0.004 && freq > 80) {
    var pv  = specPts[specPts.length - 1];
    var hue = freqToHue(freq);
    var lw  = 1.2 + vol * 9;

    var segs = [
      [x,            y,            pv.x,              pv.y,              lw,       0.65 + vol * 0.3 ],
      [cx-(x-cx),    y,            cx-(pv.x-cx),      pv.y,              lw * 0.7, 0.4  + vol * 0.25],
      [x,            cy-(y-cy),    pv.x,              cy-(pv.y-cy),      lw * 0.7, 0.4  + vol * 0.25],
      [cx-(x-cx),    cy-(y-cy),    cx-(pv.x-cx),      cy-(pv.y-cy),      lw * 0.6, 0.3  + vol * 0.2 ]
    ];

    for (var s = 0; s < segs.length; s++) {
      var seg = segs[s];
      var tx = seg[0], ty = seg[1], fx = seg[2], fy = seg[3], w = seg[4], alpha = seg[5];

      ctx.save();
      ctx.shadowBlur  = 16 + vol * 28;
      ctx.shadowColor = 'hsla(' + hue.toFixed(0) + ',90%,60%,1)';
      ctx.strokeStyle = 'hsla(' + hue.toFixed(0) + ',88%,60%,' + alpha + ')';
      ctx.lineWidth   = w;
      ctx.lineCap     = 'round';
      ctx.beginPath();
      ctx.moveTo(fx, fy);
      ctx.lineTo(tx, ty);
      ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.strokeStyle = 'hsla(' + hue.toFixed(0) + ',40%,96%,' + (0.22 + vol * 0.5) + ')';
      ctx.lineWidth   = Math.max(0.4, w * 0.2);
      ctx.lineCap     = 'round';
      ctx.beginPath();
      ctx.moveTo(fx, fy);
      ctx.lineTo(tx, ty);
      ctx.stroke();
      ctx.restore();
    }
  }

  specPts.push({ x: x, y: y });
  if (specPts.length > 3) specPts.shift();

  ctx.fillStyle = 'rgba(3,5,14,0.008)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.beginPath();
  ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(244,196,48,0.35)';
  ctx.fill();
}

// Plumes
function freqToY(freq) {
  var lo = Math.log2(80), hi = Math.log2(16000);
  var t  = 1 - Math.max(0, Math.min(1, (Math.log2(Math.max(freq, 80)) - lo) / (hi - lo)));
  return canvas.height * 0.04 + t * canvas.height * 0.72;
}

function drawFeather(freq, vol) {
  var y   = freqToY(freq) + (Math.random() - 0.5) * 35;
  var x   = Math.random() * canvas.width;
  var len = 14 + vol * 65;
  var ang = (Math.random() - 0.5) * 1.0 - Math.PI / 2;
  ctx.save(); ctx.translate(x, y); ctx.rotate(ang);
  ctx.globalAlpha = 0.65 + vol * 0.3;
  ctx.strokeStyle = frgba(freq, 0.9); ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -len); ctx.stroke();
  var barbs = 5 + Math.floor(vol * 9);
  for (var i = 0; i < barbs; i++) {
    var bt = i / barbs, bl = Math.sin(bt * Math.PI) * len * 0.28;
    ctx.globalAlpha = 0.2 + (1 - bt) * 0.35;
    for (var si = -1; si <= 1; si += 2) {
      ctx.beginPath();
      ctx.moveTo(0, -len * bt);
      ctx.quadraticCurveTo(si * bl * 0.5, -len * bt - bl * 0.15, si * bl, -len * bt);
      ctx.stroke();
    }
  }
  ctx.restore();
}

// Eclosion
function drawBloom(freq, vol) {
  var y      = freqToY(freq) + (Math.random() - 0.5) * 40;
  var x      = Math.random() * canvas.width;
  var r      = 5 + vol * 45;
  var petals = 4 + Math.floor(freq / 1100);
  bloomA += 0.08;
  ctx.save(); ctx.translate(x, y); ctx.rotate(bloomA);
  ctx.globalAlpha = 0.6 + vol * 0.35;
  for (var i = 0; i < petals; i++) {
    ctx.save(); ctx.rotate((i / petals) * Math.PI * 2);
    ctx.beginPath();
    ctx.ellipse(0, -r * 0.5, r * 0.17, r * 0.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = frgba(freq, 0.75); ctx.fill();
    ctx.restore();
  }
  ctx.beginPath(); ctx.arc(0, 0, r * 0.12, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,245,100,0.95)'; ctx.fill();
  ctx.restore();
}

// Vague
function drawWave(freq, vol) {
  var cy   = freqToY(freq);
  var amp  = 7 + vol * 38;
  var span = 100 + vol * 70;
  var cx2  = Math.random() * (canvas.width - span) + span / 2;
  waveT += 0.07;
  ctx.save();
  ctx.globalAlpha = 0.5 + vol * 0.4;
  ctx.strokeStyle = frgba(freq, 1);
  ctx.lineWidth   = 1 + vol * 2.5;
  ctx.shadowBlur  = 10 + vol * 18;
  ctx.shadowColor = frgba(freq, 0.8);
  ctx.beginPath();
  for (var i = -span; i <= span; i++) {
    var wx = cx2 + i;
    var wy = cy + Math.sin((i * freq / 1600) + waveT) * amp * (1 - Math.pow(Math.abs(i) / span, 1.6));
    if (i === -span) ctx.moveTo(wx, wy); else ctx.lineTo(wx, wy);
  }
  ctx.stroke(); ctx.restore();
}

// Boucle principale
function loop(ts) {
  if (!listening) return;
  raf = requestAnimationFrame(loop);

  var df  = dominantFreq();
  var freq = df.freq, volume = df.volume;
  var r   = getRms();

  hudVolFill.style.width = Math.min(100, r * 380) + '%';
  if (freq > 80 && r > 0.008) {
    hudFreq.textContent = Math.round(freq) + ' Hz';
    hudNote.textContent = freqToNote(freq);
  } else {
    hudFreq.textContent = '- Hz';
    hudNote.textContent = '-';
  }

  if (drawStyle === 0) {
    drawSpectrograph(freq, volume, r);
  } else if (freq > 80 && r > 0.012 && ts - lastMark > 32) {
    lastMark = ts;
    if      (drawStyle === 1) drawFeather(freq, volume);
    else if (drawStyle === 2) drawBloom(freq, volume);
    else if (drawStyle === 3) drawWave(freq, volume);
  }
}

// Micro
function toggleListen() {
  if (listening) {
    listening = false;
    cancelAnimationFrame(raf);
    try { micSrc.disconnect(); }  catch(e) {}
    try { audioCtx.close(); }     catch(e) {}
    micSrc = null; audioCtx = null;
    btnListen.textContent = 'Ecouter';
    btnListen.classList.remove('lit');
    hudVolFill.style.width = '0%';
    statusEl.textContent = 'En pause - toile preservee';
    return;
  }

  statusEl.textContent = "Demande d'acces au microphone...";

  navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
    video: false
  }).then(function(stream) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize               = 8192;
    analyser.smoothingTimeConstant = 0.8;
    bufLen   = analyser.frequencyBinCount;
    freqData = new Uint8Array(bufLen);
    timeData = new Uint8Array(bufLen);
    micSrc   = audioCtx.createMediaStreamSource(stream);
    micSrc.connect(analyser);
    listening = true;
    btnListen.textContent = 'Pause';
    btnListen.classList.add('lit');
    statusEl.textContent = 'A l\'ecoute - sifflez ou laissez les oiseaux peindre';
    requestAnimationFrame(loop);
  }).catch(function(err) {
    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError')
      statusEl.textContent = 'Permission refusee - autorisez le micro dans les reglages';
    else if (err.name === 'NotFoundError')
      statusEl.textContent = 'Aucun microphone detecte';
    else
      statusEl.textContent = 'Erreur : ' + err.name;
  });
}

// Boutons
btnListen.addEventListener('click', toggleListen);

btnClear.addEventListener('click', function() {
  resetSpec();
  paintBg();
  statusEl.textContent = 'Toile effacee';
});

btnSave.addEventListener('click', function() {
  var a = document.createElement('a');
  a.download = 'birdsong-' + Date.now() + '.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
  statusEl.textContent = 'Image sauvegardee';
});

var dots = document.querySelectorAll('.sdot');
for (var di = 0; di < dots.length; di++) {
  dots[di].addEventListener('click', function() {
    for (var i = 0; i < dots.length; i++) dots[i].classList.remove('on');
    this.classList.add('on');
    drawStyle = parseInt(this.dataset.s);
    resetSpec();
    var names = ['Spectrographe','Plumes','Eclosion','Vague'];
    statusEl.textContent = 'Style : ' + names[drawStyle];
  });
}
</script>
</body>
</html>
